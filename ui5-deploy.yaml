# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: zdg.mm.gatepass
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: MYS4CLOUD_100_DEV
          url: https://my428751.s4hana.cloud.sap
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZMM_GATEPASS
          description: Gate Pass Application
          package: ZDG_PKG_ABAP_MM
          transport: BBCK901419
        exclude:
          - /test/
